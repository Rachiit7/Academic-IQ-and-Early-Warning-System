<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — AcademIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <script src="{{ url_for('static', filename='js/charts.js') }}" defer></script>
</head>
<body>
<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}"><span>{{ msg }}</span><button class="flash-close">✕</button></div>
    {% endfor %}
  {% endwith %}
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🔒</div>
      <div>
        <div class="logo-text">New Password</div>
        <div class="logo-sub">AcademIQ</div>
      </div>
    </div>
    <h1>Set new password</h1>
    <p class="subtitle">Choose a strong password (minimum 6 characters).</p>

    <form method="POST" action="{{ url_for('reset_password', token=token) }}" style="margin-top:24px;">
      <div class="form-group">
        <label for="password">New Password</label>
        <input id="password" type="password" name="password" class="form-control"
               placeholder="••••••••" required minlength="6"/>
        <div class="pwd-hint">Minimum 6 characters</div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" type="password" name="confirm" class="form-control"
               placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Update Password</button>
    </form>
  </div>
</div>
</body>
</html>
